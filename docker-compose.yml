version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: smart_campus_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: smart_campus_db
      MYSQL_USER: campus_user
      MYSQL_PASSWORD: campus_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: smart_campus_web
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DB_NAME=smart_campus_db
      - DB_USER=campus_user
      - DB_PASSWORD=campus_password
      - DB_HOST=db
      - DB_PORT=3306
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      # You can override SECRET_KEY here for production
      - SECRET_KEY=django-insecure-dev-only-key-docker
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
  static_volume:
  media_volume:
